services:
  tempmail-api:
    build: .
    container_name: tempmail-api
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://cloudmail:cloudmail@tempmail-postgres:5432/cloudmail}"
      REDIS_URL: "${REDIS_URL:-redis://tempmail-redis:6379/0}"
      SMTP_GATEWAY_TOKEN: "${SMTP_GATEWAY_TOKEN:-change_me_gateway_token}"
      SMTP_OUT_HOST: "${SMTP_OUT_HOST:-}"
      SMTP_OUT_PORT: "${SMTP_OUT_PORT:-587}"
      SMTP_OUT_USERNAME: "${SMTP_OUT_USERNAME:-}"
      SMTP_OUT_PASSWORD: "${SMTP_OUT_PASSWORD:-}"
      SMTP_OUT_FROM_EMAIL: "${SMTP_OUT_FROM_EMAIL:-}"
      SMTP_OUT_USE_TLS: "${SMTP_OUT_USE_TLS:-true}"
      SMTP_OUT_USE_SSL: "${SMTP_OUT_USE_SSL:-false}"
      DIRECT_SEND_ENABLED: "${DIRECT_SEND_ENABLED:-false}"
      DIRECT_HELO_HOST: "${DIRECT_HELO_HOST:-}"
      DKIM_SELECTOR: "${DKIM_SELECTOR:-default}"
      DKIM_DOMAIN: "${DKIM_DOMAIN:-}"
      DKIM_PRIVATE_KEY_PATH: "${DKIM_PRIVATE_KEY_PATH:-}"
      CLOUD_MAIL_ADMIN: "${CLOUD_MAIL_ADMIN:-superadmin@jhupo.com}"
      CLOUD_MAIL_ADMIN_PASSWORD: "${CLOUD_MAIL_ADMIN_PASSWORD:-JIang521.}"
      CLOUD_MAIL_JWT_SECRET: "${CLOUD_MAIL_JWT_SECRET:-change_me_super_secret}"
      CLOUD_MAIL_DOMAIN: "${CLOUD_MAIL_DOMAIN:-}"
      APP_VERSION: "${APP_VERSION:-dev}"
      APP_BUILD_SHA: "${APP_BUILD_SHA:-unknown}"
      APP_BUILD_TIME: "${APP_BUILD_TIME:-}"
      UPDATE_SOURCE_REPO: "${UPDATE_SOURCE_REPO:-jhupo/temp-mail-server}"
      UPDATE_CHECK_URL: "${UPDATE_CHECK_URL:-}"
      UPDATE_WEBHOOK_URL: "${UPDATE_WEBHOOK_URL:-}"
      UPDATE_WEBHOOK_TOKEN: "${UPDATE_WEBHOOK_TOKEN:-}"
      UPDATE_WEBHOOK_TIMEOUT: "${UPDATE_WEBHOOK_TIMEOUT:-15}"
    ports:
      - "8000:8000"
    volumes:
      - ./.secrets:/app/secrets:ro
    depends_on:
      tempmail-postgres:
        condition: service_healthy
      tempmail-redis:
        condition: service_started

  tempmail-smtp:
    build: .
    container_name: tempmail-smtp
    restart: unless-stopped
    command: ["python", "-m", "app.smtp_server"]
    environment:
      SMTP_HOST: "0.0.0.0"
      SMTP_PORT: "25"
      SMTP_API_BASE: "http://tempmail-api:8000"
      SMTP_GATEWAY_TOKEN: "${SMTP_GATEWAY_TOKEN:-change_me_gateway_token}"
    ports:
      - "25:25"
    depends_on:
      - tempmail-api

  tempmail-postgres:
    image: postgres:16
    container_name: tempmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cloudmail}"
      POSTGRES_USER: "${POSTGRES_USER:-cloudmail}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cloudmail}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempmail-redis:
    image: redis:7-alpine
    container_name: tempmail-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    image: caddy:2
    container_name: cloud-mail-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tempmail-api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
