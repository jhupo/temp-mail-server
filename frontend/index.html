<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temp Mail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <header class="topbar card">
        <div>
          <p class="tag">Disposable Mail</p>
          <h1>Temp Mail Inbox</h1>
          <p class="sub">登录后自动创建随机邮箱，收件箱实时刷新。</p>
        </div>
        <button id="newMailboxBtn" class="btn primary">新建随机邮箱</button>
      </header>

      <section id="loginPanel" class="card login">
        <h2>进入收件箱</h2>
        <p class="sub">填完后点击进入，会自动创建一个随机邮箱。</p>
        <div class="row">
          <label>
            API Key（可选）
            <input id="apiKeyInput" placeholder="如果后端开启了 API Key 就填这里" />
          </label>
          <label>
            默认域名
            <input id="domainInput" placeholder="temp.jhupo.com" />
          </label>
          <label>
            TTL(分钟)
            <input id="ttlInput" type="number" min="1" max="1440" value="60" />
          </label>
        </div>
        <button id="enterBtn" class="btn primary">登录并创建邮箱</button>
        <p id="loginMsg" class="sub"></p>
      </section>

      <section id="appPanel" class="layout hidden">
        <aside class="card side">
          <div class="mailbox-head">
            <h2>邮箱列表</h2>
            <button id="refreshInboxBtn" class="btn">刷新</button>
          </div>
          <div id="mailboxList" class="mailbox-list"></div>
        </aside>

        <section class="card main">
          <div class="address-bar">
            <div>
              <p class="tag">Current Address</p>
              <h3 id="currentAddress">-</h3>
              <p class="sub">过期时间：<span id="currentExpiry">-</span></p>
            </div>
            <div class="actions">
              <button id="copyAddressBtn" class="btn">复制邮箱</button>
              <button id="copyTokenBtn" class="btn">复制Token</button>
            </div>
          </div>

          <div class="inbox-tools">
            <label class="check">
              <input id="autoRefreshToggle" type="checkbox" checked />
              <span>自动刷新(8秒)</span>
            </label>
            <button id="extractCodeBtn" class="btn">提取验证码</button>
            <span class="code-pill">Code: <strong id="latestCode">-</strong></span>
          </div>

          <div id="messageList" class="message-list"></div>
        </section>
      </section>
    </main>
    <script src="/frontend/app.js"></script>
  </body>
</html>
