name: CI Checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile $(find app -name "*.py" -type f)

      - name: Smoke import app
        run: |
          python - <<'PY'
          from app.main import app
          print("routes", len(app.routes))
          PY

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mail-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "mail-vue/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
